<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model S | Premium E-commerce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="tesla-nav">
        <div class="logo">LUXE</div>
        <ul class="nav-menu">
            <li><a href="#">Shop</a></li>
            <li><a href="#">Account</a></li>
            <li><a href="#">Menu</a></li>
        </ul>
    </nav>

    <main class="page-wrapper">
        <section class="visual-stage">
            <div class="sticky-image-container">
                <img src="https://images.unsplash.com/photo-1617788138017-80ad40651399?auto=format&fit=crop&q=80&w=1000" 
                     alt="Product" id="main-product-image" class="hero-image">
            </div>
        </section>

        <aside class="configurator-sidebar">
            <div class="content-block">
                <h1 class="product-title">Model S Plaid</h1>
                <p class="tagline">Plaid: 1,020 hp | 1.99s 0-60 mph</p>
                
                <div class="specs-row">
                    <div class="spec-card">
                        <h3>396mi</h3>
                        <p>Range (est.)</p>
                    </div>
                    <div class="spec-card">
                        <h3>1.99s</h3>
                        <p>0-60 mph</p>
                    </div>
                </div>

                <div class="selection-box">
                    <h3>Select Color</h3>
                    <div class="color-options">
                        <button class="dot white active"></button>
                        <button class="dot black"></button>
                        <button class="dot red"></button>
                    </div>
                </div>

                <button class="cta-button">Order Now</button>
            </div>

            <div class="extra-info">
                <h3>Interior Highlights</h3>
                <p>A 17” touchscreen with left-right tilt offers 2200 x 1300 resolution, true colors and exceptional responsiveness for gaming, movies and more.</p>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
