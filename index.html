<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- CHANGE 1: Improved mobile responsiveness -->
    <!-- WHY: Ensures proper scaling on all devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CHANGE 2: Added SEO description -->
    <!-- WHY: Improves search engine visibility -->
    <meta name="description" content="NovaCartel - Premium vehicles, energy solutions, and apparel. Experience next-level e-commerce.">

    <title>NovaCartel - Premium E-commerce</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">

        <!-- CHANGE 3: Added role for accessibility -->
        <!-- WHY: Helps screen readers identify navigation -->
        <div class="logo" role="heading">NovaCartel</div>

        <ul class="nav-menu">
            <li><a href="#vehicles">Vehicles</a></li>
            <li><a href="#energy">Energy</a></li>
            <li><a href="#apparel">Apparel</a></li>

            <li class="discover">
                <a href="#">Discover</a>

                <div class="mega-menu">
                    <div class="mega-col">
                        <h4>Resources</h4>
                        <a href="#">Demo Drive</a>
                        <a href="#">Insurance</a>
                        <a href="#">Video Guides</a>
                    </div>

                    <div class="mega-col">
                        <h4>Locations</h4>
                        <a href="#">Kampala (HQ)</a>
                        <a href="#">Nairobi</a>
                        <a href="#">Kigali</a>
                    </div>

                    <div class="mega-col">
                        <h4>Company</h4>
                        <a href="#">About</a>
                        <a href="#">Careers</a>
                        <a href="#">Investors</a>
                    </div>
                </div>
            </li>

            <li><a href="#">Shop</a></li>

            <!-- CHANGE 4: Added aria-label -->
            <!-- WHY: Improves accessibility -->
            <li>
                <button class="auth-btn" onclick="toggleAuthModal()" aria-label="Open authentication modal">
                    Sign In
                </button>
            </li>
        </ul>
    </nav>


    <!-- Auth Modal -->
    <div id="auth-modal" class="modal-overlay">

        <!-- CHANGE 5: Added role dialog -->
        <!-- WHY: Accessibility improvement -->
        <div class="modal-content" role="dialog">

            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('sign-in')">Sign In</button>
                <button class="tab-btn" onclick="switchTab('sign-up')">Sign Up</button>
            </div>

            <div id="sign-in-tab" class="auth-tab active">
                <button class="google-btn">Sign in with Google</button>

                <div class="divider">OR</div>

                <!-- CHANGE 6: Added required attributes -->
                <!-- WHY: Prevent empty form submission -->
                <input type="email" placeholder="Email" class="auth-input" required>
                <input type="password" placeholder="Password" class="auth-input" required>

                <button class="cta-button">Sign In</button>
                <a href="#" class="forgot-link">Forgot Password?</a>
            </div>

            <div id="sign-up-tab" class="auth-tab">
                <button class="google-btn">Sign up with Google</button>

                <div class="divider">OR</div>

                <input type="email" placeholder="Email" class="auth-input" required>
                <input type="password" placeholder="Password" class="auth-input" required>
                <input type="password" placeholder="Confirm Password" class="auth-input" required>

                <button class="cta-button">Sign Up</button>
            </div>
        </div>
    </div>


    <!-- Hero Visual -->
    <main class="page-wrapper">

        <section class="visual-stage">
            <div class="hero-wrapper">

                <!-- CHANGE 7: Added loading="lazy" -->
                <!-- WHY: Improves performance -->
                <img 
                    src="https://images.unsplash.com/photo-1617788138017-80ad40651399?w=1200"
                    id="hero-image"
                    class="hero-image"
                    alt="Hero Product"
                    loading="lazy"
                >
            </div>
        </section>


        <!-- Dynamic Content -->
        <!-- CHANGE 8: Added semantic role -->
        <!-- WHY: Improves accessibility -->
        <div id="content-sections" class="content-sections" role="main">
            <!-- Product grid will render here -->
        </div>


        <!-- Configurator Sidebar -->
        <aside class="configurator-sidebar">

            <div class="content-block">
                <h1 class="configurator-title" id="config-title">Model S Plaid</h1>

                <!-- CHANGE 9: Fixed ID mismatch -->
                <!-- WHY: Matches JS selector (.tagline) -->
                <p class="tagline">1020 hp | 1.99s 0-60 mph</p>

                <div class="selection-group">
                    <h3>Select Color</h3>
                    <div class="color-options" id="color-options"></div>
                </div>

                <div class="selection-group">
                    <h3>Wheels</h3>
                    <div class="wheel-options" id="wheel-options"></div>
                </div>

                <!-- CHANGE 10: Added button type -->
                <!-- WHY: Prevents unintended form behavior -->
                <button class="cta-button" id="cta-button" type="button">
                    Order Now
                </button>
            </div>

        </aside>
    </main>


    <!-- CHANGE 11: Added defer loading -->
    <!-- WHY: Improves page load performance -->
    <script src="script.js" defer></script>

</body>
</html>
